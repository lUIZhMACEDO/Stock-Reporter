name: Daily Stock Report Emailer

on:
  schedule:
    # 9:00 AM EST = 14:00 UTC (standard time). During EDT this runs at 10:00 AM local.
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      test_run:
        description: "Send as test email subject"
        required: false
        default: "false"

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report emailer
        env:
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TOP_COUNT: ${{ secrets.TOP_COUNT }}
          TRADE_IDEA_COUNT: ${{ secrets.TRADE_IDEA_COUNT }}
          TEST_RUN: ${{ github.event.inputs.test_run || 'false' }}
        run: python email_sender.py
